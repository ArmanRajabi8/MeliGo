<button (click)="openAdd()" *ngIf="!isAdding && !isEditing">Add New Item</button>

<!-- Add / Edit form -->
<div *ngIf="isAdding || isEditing" class="item-form">
  <h3>{{ isAdding ? 'Add New Item' : 'Edit Item' }}</h3>

  <label>Name: <input type="text" [(ngModel)]="formItem.name" /></label>
  <label>Price: <input type="number" [(ngModel)]="formItem.price" /></label>
  <label>Image URL: <input type="text" [(ngModel)]="formItem.imageUrl" /></label>
  <label>Category: <input type="text" [(ngModel)]="formItem.category" /></label>
  <label>
    Importance:
    <select [(ngModel)]="formItem.importance">
      <option *ngFor="let star of [1,2,3,4,5]" [value]="star">{{star}}</option>
    </select>
  </label>

  <button (click)="saveItem()">Save</button>
  <button (click)="cancel()">Cancel</button>
</div>

<!-- Items list -->
<div *ngIf="items.length > 0; else noItems">
  <ul class="item-list">
    <li *ngFor="let item of items" class="item-card">
      <img [src]="item.imageUrl || 'assets/images/default.jpg'" alt="{{item.name}}" class="item-image" />
      <div class="item-details">
        <h4>{{item.name}}</h4>
        <p>Price: {{item.price | currency}}</p>
        <p>Date Added: {{item.dateAdded | date:'mediumDate'}}</p>
        <p>Category: {{item.category}}</p>
        <p>
          Importance:
          <span *ngFor="let star of [1,2,3,4,5]">
            <i class="fa" [ngClass]="star <= item.importance ? 'fa-star' : 'fa-star-o'"></i>
          </span>
        </p>
        <button (click)="openEdit(item)">Modify</button>
        <button (click)="deleteItem(item)">Delete</button>
      </div>
    </li>
  </ul>
</div>

<ng-template #noItems>
  <p>No items found in your hub</p>
</ng-template>
