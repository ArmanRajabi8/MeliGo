<div class="app-shell">
  <header class="page-card app-header reveal">
    <div class="brand-cluster">
      <a class="brand-mark" [routerLink]="['/']" aria-label="Open the MeliGo home page">
        <span class="brand-mark__eyebrow">Universal Shopping Cart</span>
        <span class="brand-mark__wordmark">Meli<span>Go</span></span>
      </a>
      <p class="brand-mark__copy">
        One place to collect products, keep the best images, and return with clarity instead of chaos.
      </p>
    </div>

    <nav class="app-nav" aria-label="Primary">
      <a
        class="nav-link"
        [routerLink]="['/']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Home
      </a>
      <a
        class="nav-link"
        [routerLink]="['/postList', 'index']"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        Dashboard
      </a>
      <a
        class="nav-link"
        [routerLink]="['/profile']"
        routerLinkActive="is-active"
      >
        Profile
      </a>
    </nav>

    <div class="header-actions">
      <div class="header-status" [class.is-live]="userService.isLoggedIn()">
        <span class="header-status__label">{{ statusLabel }}</span>
        <span class="header-status__copy">{{ statusCopy }}</span>
      </div>

      <a
        class="app-button app-button--ghost"
        [routerLink]="['/register']"
        *ngIf="!userService.isLoggedIn()"
      >
        Create account
      </a>
      <a
        class="app-button app-button--primary"
        [routerLink]="['/login']"
        *ngIf="!userService.isLoggedIn()"
      >
        Log in
      </a>
      <a
        class="app-button app-button--ghost"
        [routerLink]="['/postList', 'index']"
        *ngIf="userService.isLoggedIn()"
      >
        Open cart
      </a>
      <button
        class="app-button app-button--secondary"
        (click)="logout()"
        *ngIf="userService.isLoggedIn()"
      >
        Log out
      </button>

      <a class="profile-ring" [routerLink]="['/profile']" aria-label="Open profile">
        <img
          [src]="avatarUrl"
          alt="Profile"
          class="profile-ring__image"
          (error)="avatarUrl = 'assets/images/default.jpg'"
        />
      </a>
    </div>
  </header>

  <main class="page-stage">
    <router-outlet></router-outlet>
  </main>
</div>
