<!DOCTYPE html>
<html>
<head>
  <title>MeliGo</title>
  <style>
    body {
      font-family: sans-serif;
      width: 280px;
      padding: 10px;
    }
    h3 {
      margin-top: 0;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 10px;
      color: green;
      font-size: 14px;
    }
    #error {
      margin-top: 10px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h3>🛒 MeliGo</h3>
  <button id="sendButton">Save this product</button>
  <div id="status"></div>
  <div id="error"></div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
