<!DOCTYPE html>
<html>
<head>
  <title>MeliGo</title>
  <style>
    body {
      font-family: sans-serif;
      width: 280px;
      padding: 10px;
    }
    h3 {
      margin-top: 0;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #007bff;
      color: white;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 10px;
      color: green;
      font-size: 14px;
    }
    #error {
      margin-top: 10px;
      color: red;
      font-size: 14px;
    }
    #result {
      margin-top: 12px;
    }
    .product-preview {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px;
      border-radius: 8px;
      background: #f4f7fb;
    }
    .product-preview__image {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 6px;
      background: white;
      flex-shrink: 0;
    }
    .product-preview__body {
      min-width: 0;
    }
    .product-preview__title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .product-preview__meta {
      font-size: 12px;
      color: #475569;
      line-height: 1.4;
      word-break: break-word;
    }
    button:disabled {
      cursor: wait;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <h3>🛒 MeliGo</h3>
  <button id="sendButton">Save this product</button>
  <div id="status"></div>
  <div id="error"></div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
